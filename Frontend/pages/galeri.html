<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="../assets/img/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeri - Jaf Donation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&family=Noto+Serif:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { prefix: 'tw-', corePlugins: { preflight: false },
      theme: { extend: { colors: { primary: '#1A5276', secondary: '#2980B9', accent: '#E8F4FD', gold: '#C8A44A' } } } }
  </script>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .lightbox-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
      z-index: 9999; align-items: center; justify-content: center;
    }
    .lightbox-overlay.active { display: flex; }
    .lightbox-overlay img { max-width: 90vw; max-height: 85vh; border-radius: 12px; object-fit: contain; }
    .lightbox-overlay .lb-caption { color: #fff; text-align: center; margin-top: 12px; font-size: .9rem; }
    .lightbox-overlay .lb-close { position: absolute; top: 20px; right: 24px; color: #fff; font-size: 2rem; cursor: pointer; line-height: 1; }
    .lang-btn.active { border-color: #1A5276 !important; opacity: 1 !important; }
    .lang-btn:hover { opacity: 1 !important; }
  </style>
</head>
<body class="tw-font-sans">
<nav class="site-nav">
  <div class="container">
    <a class="nav-logo" href="/">
      <img src="../assets/img/logo.png" alt="Jatiwangi Art Factory" style="height:48px;width:auto;object-fit:contain;mix-blend-mode:multiply;" />
    </a>
    <div class="nav-links" id="navLinks">
      <a href="/berita" data-i18n="nav.berita">Berita</a>
      <a href="/galeri" data-i18n="nav.galeri" class="active">Galeri</a>
      <a href="/donasi" data-i18n="nav.donasi">Donasi</a>
      <a href="/benah-kampung" data-i18n="nav.benah">Benah Kampung</a>
      <a href="/kontak" data-i18n="nav.kontak">Kontak</a>
    </div>
    <div class="nav-actions">
      <form class="d-flex" onsubmit="return navSearch(event)" style="margin:0;">
        <input type="text" class="nav-q" data-i18n-ph="nav.search" placeholder="Cari artikel..." style="border:1.5px solid #cbd5e1;border-right:none;border-radius:20px 0 0 20px;font-size:.78rem;padding:5px 12px;min-width:130px;outline:none;" />
        <button type="submit" style="background:#005BAA;color:#fff;border:1.5px solid #005BAA;border-radius:0 20px 20px 0;padding:5px 11px;cursor:pointer;line-height:1;">
          <i class="bi bi-search" style="font-size:.75rem;"></i>
        </button>
      </form>
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="id" onclick="setLang('id')" title="Bahasa Indonesia">
          <img src="https://flagcdn.com/20x15/id.png" alt="ID" />
        </button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')" title="English">
          <img src="https://flagcdn.com/20x15/gb.png" alt="EN" />
        </button>
      </div>
    </div>
    <button class="nav-toggle" onclick="document.getElementById('mobileNav').classList.toggle('open')">
      <i class="bi bi-list"></i>
    </button>
  </div>
  <div class="mobile-nav" id="mobileNav">
    <div class="mobile-nav-search">
      <form onsubmit="return navSearch(event)">
        <input type="text" class="nav-q-mob" placeholder="Cari artikel..." />
        <button type="submit"><i class="bi bi-search"></i></button>
      </form>
    </div>
    <a href="/berita" class=""><i class="bi bi-newspaper me-2"></i><span data-i18n="nav.berita">Berita</span></a>
    <a href="/galeri" class="active"><i class="bi bi-images me-2"></i><span data-i18n="nav.galeri">Galeri</span></a>
    <a href="/donasi" class=""><i class="bi bi-heart me-2"></i><span data-i18n="nav.donasi">Donasi</span></a>
    <a href="/benah-kampung" class=""><i class="bi bi-house me-2"></i><span data-i18n="nav.benah">Benah Kampung</span></a>
    <a href="/kontak" class=""><i class="bi bi-envelope me-2"></i><span data-i18n="nav.kontak">Kontak</span></a>
    <div style="padding:6px 16px;display:flex;align-items:center;gap:6px;">
      <button class="lang-btn active" data-lang="id" onclick="setLang('id')" title="Bahasa Indonesia">
        <img src="https://flagcdn.com/20x15/id.png" alt="ID" />
      </button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')" title="English">
        <img src="https://flagcdn.com/20x15/gb.png" alt="EN" />
      </button>
    </div>
  </div>
</nav>

  <div class="page-header">
    <div class="container">
      <nav aria-label="breadcrumb" class="tw-mb-3">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="/" data-i18n="nav.home">Beranda</a></li>
          <li class="breadcrumb-item active">Galeri Foto & Video</li>
        </ol>
      </nav>
      <h1 class="tw-text-4xl tw-font-serif tw-font-bold" data-i18n="galeri.heading">Galeri</h1>
      <p class="tw-text-white/80 tw-mt-2" data-i18n="galeri.sub">Dokumentasi kegiatan dan program kami</p>
    </div>
  </div>

  <section class="tw-py-12 tw-bg-gray-50">
    <div class="container">
      <!-- Tabs -->
      <ul class="nav nav-pills tw-mb-8 justify-content-center gap-2" id="galleryTabs">
        <li class="nav-item">
          <button class="nav-link active tw-rounded-full tw-px-6" id="tabFoto" data-type="image" data-i18n="galeri.foto">Foto</button>
        </li>
        <li class="nav-item">
          <button class="nav-link tw-rounded-full tw-px-6" id="tabVideo" data-type="video" data-i18n="galeri.video">Video</button>
        </li>
      </ul>

      <!-- Loading State -->
      <div id="loadingState" class="text-center tw-py-16">
        <div class="spinner-border tw-text-primary" role="status"></div>
        <p class="tw-text-gray-400 tw-mt-3" data-i18n="galeri.loading">Memuat galeri...</p>
      </div>

      <!-- Empty State -->
      <div id="emptyState" class="text-center tw-py-16 d-none">
        <i class="bi bi-images tw-text-gray-300 tw-text-6xl d-block tw-mb-4"></i>
        <p class="tw-text-gray-400 tw-text-lg">Belum ada item galeri yang tersedia.</p>
      </div>

      <!-- Gallery Grid -->
      <div id="galleryGrid" class="row g-3 d-none"></div>

      <!-- Pagination -->
      <nav id="paginationWrapper" class="d-flex justify-content-center tw-mt-10 d-none">
        <ul id="pagination" class="pagination"></ul>
      </nav>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox-overlay" id="lightbox">
    <span class="lb-close" id="lbClose">&times;</span>
    <div class="text-center">
      <img id="lbImg" src="" alt="" />
      <p class="lb-caption" id="lbCaption"></p>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
<footer style="background:#1a1a1a;">
  <div style="padding:16px 20px;text-align:center;">
    <a href="https://github.com/babanmisbahudin" target="_blank" rel="noopener" style="font-size:clamp(9px,2.5vw,12px);color:#999;text-decoration:none;white-space:nowrap;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#999'">Copyright &copy; 2025 Yayasan Daun Salambar &mdash; Jatiwangi Art Factory</a>
  </div>
</footer>

  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  let currentType = 'image';
  let currentPage = 1;

  const galleryGrid = document.getElementById('galleryGrid');
  const loadingState = document.getElementById('loadingState');
  const emptyState = document.getElementById('emptyState');
  const paginationWrapper = document.getElementById('paginationWrapper');
  const paginationEl = document.getElementById('pagination');
  const lightbox = document.getElementById('lightbox');

  // Tab switching
  document.getElementById('galleryTabs').addEventListener('click', e => {
    const btn = e.target.closest('button[data-type]');
    if (!btn) return;
    document.querySelectorAll('#galleryTabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentType = btn.dataset.type;
    currentPage = 1;
    loadGallery();
  });

  // Lightbox
  document.getElementById('lbClose').addEventListener('click', () => lightbox.classList.remove('active'));
  lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('active'); });

  function openLightbox(url, title) {
    document.getElementById('lbImg').src = url;
    document.getElementById('lbCaption').textContent = title || '';
    lightbox.classList.add('active');
  }

  function renderPhotos(items) {
    let html = '';
    items.forEach(item => {
      html += `
        <div class="col-lg-4 col-md-6 col-6">
          <div class="tw-bg-white tw-rounded-2xl tw-h-56 tw-overflow-hidden tw-cursor-pointer hover:tw-opacity-80 tw-transition-all tw-relative tw-shadow-sm group"
               onclick="openLightbox('${item.file_url}', '${(item.title||'').replace(/'/g,"\\'")}')">
            <img src="${item.file_url}" alt="${item.title || ''}" class="tw-w-full tw-h-full tw-object-cover" loading="lazy"
                 onerror="this.parentElement.innerHTML='<div class=\'tw-h-full tw-bg-accent d-flex align-items-center justify-content-center\'><i class=\'bi bi-image tw-text-primary tw-text-5xl\'></i></div>'" />
            <div class="tw-absolute tw-inset-0 tw-bg-primary/70 tw-opacity-0 group-hover:tw-opacity-100 tw-transition-all d-flex align-items-center justify-content-center">
              <i class="bi bi-zoom-in tw-text-white tw-text-3xl"></i>
            </div>
          </div>
          <p class="tw-text-gray-600 tw-text-sm tw-mt-2 tw-font-medium">${item.title || ''}</p>
        </div>`;
    });
    return html;
  }

  function renderVideos(items) {
    let html = '';
    items.forEach(item => {
      const isYoutube = item.file_url && (item.file_url.includes('youtube') || item.file_url.includes('youtu.be'));
      let embedUrl = '';
      if (isYoutube) {
        const match = item.file_url.match(/(?:v=|youtu\.be\/)([^&?]+)/);
        if (match) embedUrl = `https://www.youtube.com/embed/${match[1]}`;
      }

      if (embedUrl) {
        html += `
          <div class="col-lg-4 col-md-6">
            <div class="tw-bg-white tw-rounded-2xl tw-overflow-hidden tw-shadow-sm hover:tw-shadow-lg tw-transition-all">
              <div class="tw-h-48 tw-overflow-hidden">
                <iframe src="${embedUrl}" class="tw-w-full tw-h-full" frameborder="0" allowfullscreen loading="lazy"></iframe>
              </div>
              <div class="tw-p-4">
                <h6 class="tw-text-primary tw-font-bold tw-mt-1">${item.title || ''}</h6>
                <span class="tw-text-gray-400 tw-text-xs">${item.created_at || ''}</span>
              </div>
            </div>
          </div>`;
      } else {
        html += `
          <div class="col-lg-4 col-md-6">
            <div class="tw-bg-white tw-rounded-2xl tw-overflow-hidden tw-shadow-sm hover:tw-shadow-lg tw-transition-all">
              <a href="${item.file_url}" target="_blank" rel="noopener">
                <div class="tw-bg-primary/20 tw-h-48 d-flex align-items-center justify-content-center tw-relative tw-cursor-pointer">
                  <div class="tw-w-14 tw-h-14 tw-bg-primary tw-rounded-full d-flex align-items-center justify-content-center hover:tw-scale-110 tw-transition-transform">
                    <i class="bi bi-play-fill tw-text-white tw-text-2xl ms-1"></i>
                  </div>
                </div>
              </a>
              <div class="tw-p-4">
                <h6 class="tw-text-primary tw-font-bold tw-mt-1">${item.title || ''}</h6>
                <span class="tw-text-gray-400 tw-text-xs">${item.created_at || ''}</span>
              </div>
            </div>
          </div>`;
      }
    });
    return html;
  }

  function renderPagination(meta) {
    if (meta.last_page <= 1) {
      paginationWrapper.classList.add('d-none');
      return;
    }
    paginationWrapper.classList.remove('d-none');

    let html = `<li class="page-item ${meta.current_page === 1 ? 'disabled' : ''}">
      <a class="page-link" href="#" data-page="${meta.current_page - 1}">&laquo;</a></li>`;
    for (let i = 1; i <= meta.last_page; i++) {
      html += `<li class="page-item ${i === meta.current_page ? 'active' : ''}">
        <a class="page-link ${i === meta.current_page ? 'tw-bg-primary tw-border-primary' : ''}" href="#" data-page="${i}">${i}</a></li>`;
    }
    html += `<li class="page-item ${meta.current_page === meta.last_page ? 'disabled' : ''}">
      <a class="page-link" href="#" data-page="${meta.current_page + 1}">&raquo;</a></li>`;

    paginationEl.innerHTML = html;
    paginationEl.querySelectorAll('a[data-page]').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        const p = parseInt(a.dataset.page);
        if (p >= 1 && p <= meta.last_page) {
          currentPage = p;
          loadGallery();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    });
  }

  async function loadGallery() {
    loadingState.classList.remove('d-none');
    galleryGrid.classList.add('d-none');
    emptyState.classList.add('d-none');
    paginationWrapper.classList.add('d-none');

    try {
      const res = await fetch(`${window.API_BASE}/gallery?type=${currentType}&page=${currentPage}`);
      const json = await res.json();
      const items = json.data || [];

      loadingState.classList.add('d-none');

      if (!items.length) {
        emptyState.classList.remove('d-none');
        return;
      }

      galleryGrid.classList.remove('d-none');
      galleryGrid.innerHTML = currentType === 'image' ? renderPhotos(items) : renderVideos(items);
      renderPagination(json.meta || { current_page: 1, last_page: 1, total: 0 });
    } catch (e) {
      loadingState.classList.add('d-none');
      emptyState.classList.remove('d-none');
    }
  }

  loadGallery();

  function navSearch(e) {
    e.preventDefault();
    const input = e.target.querySelector('.nav-q, .nav-q-mob');
    const q = input ? input.value.trim() : '';
    if (q) window.location.href = '/berita?search=' + encodeURIComponent(q);
    return false;
  }
  initLang();
</script>
</body>
</html>
